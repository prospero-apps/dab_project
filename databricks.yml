# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 70bd57d7-30ba-4dc7-a489-868c40691397

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
# variables:
#   catalog:
#     description: The catalog to use
#   schema:
#     description: The schema to use
variables:
  catalog:
    default: "citibike_dev"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true    
    workspace:
      host: https://adb-7405610321488362.2.azuredatabricks.net/

  test:
    mode: production
    variables:
      catalog: 
        default: "citibike_test"
    presets:
      name_prefix: '[test] '
    workspace:
      host: https://adb-7405609735819405.5.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/ps2003@op.pl to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    # variables:
    #   catalog: dbw_dev_polandcentral
    #   schema: prod
    permissions:
      - user_name: ps2003@op.pl
        level: CAN_MANAGE
  prod:
    mode: production
    variables:
      catalog: 
        default: "citibike_prod"
    workspace:
      host: https://adb-7405616027371462.2.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/ps2003@op.pl to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    # variables:
    #   catalog: dbw_dev_polandcentral
    #   schema: prod
    permissions:
      - user_name: ps2003@op.pl
        level: CAN_MANAGE
